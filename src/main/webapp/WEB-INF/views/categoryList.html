<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 목록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .btn-primary { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 20px; }
        .btn-primary:hover { background: #357abd; }

        /* 메시지 */
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; }
        .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead { background: #4a90d9; color: white; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #dee2e6; }
        tbody tr:hover { background: #f1f7ff; }
        .empty-msg { text-align: center; color: #6c757d; padding: 30px; }

        /* 삭제 버튼 */
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .btn-delete:hover { background: #c0392b; }

        footer { margin-top: 40px; border-top: 1px solid #dee2e6; padding-top: 12px; color: #6c757d; font-size: 0.85em; }
    </style>
</head>
<body>

<h1>카테고리 목록</h1>

<!-- Flash 메시지 -->
<div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
<div class="alert-error"   th:if="${errorMessage}"   th:text="${errorMessage}"></div>

<a class="btn-primary" th:href="@{/categories/create}">+ 카테고리 등록</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리 이름</th>
        <th>삭제</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}"
                  method="post"
                  onsubmit="return confirm('정말 삭제하시겠습니까?')">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(categories)}">
        <td colspan="3" class="empty-msg">등록된 카테고리가 없습니다.</td>
    </tr>
    </tbody>
</table>

</body>

<footer>
    <p th:text="${'실습 수행 일시: ' +
    #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}">
    </p>
    <p>학번: 2291093 | 성명: 이재령</p>
</footer>
</html>
