<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 목록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }

        /* 검색 폼 */
        .search-bar {
            display: flex; gap: 8px; align-items: center;
            background: #f8f9fa; border: 1px solid #dee2e6;
            border-radius: 6px; padding: 14px 16px; margin: 20px 0;
        }
        .search-bar input[type="text"] {
            padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px;
            font-size: 1em; width: 220px; font-family: inherit;
        }
        .search-bar input[type="text"]:focus {
            outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }
        .search-bar select {
            padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px;
            font-size: 1em; font-family: inherit; background: white;
        }
        .btn-search {
            padding: 8px 18px; background: #4a90d9; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 1em;
        }
        .btn-search:hover { background: #357abd; }
        .btn-reset {
            padding: 8px 14px; background: #6c757d; color: white;
            text-decoration: none; border-radius: 4px; font-size: 1em;
        }
        .btn-reset:hover { background: #545b62; }

        /* 상단 액션 바 */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .result-count { font-size: 0.9em; color: #6c757d; }
        .btn {
            display: inline-block; padding: 8px 16px; background: #4a90d9;
            color: white; text-decoration: none; border-radius: 4px;
        }
        .btn:hover { background: #357abd; }

        /* 알림 메시지 */
        .alert-success {
            background: #d4edda; border: 1px solid #c3e6cb; color: #155724;
            padding: 12px 16px; border-radius: 4px; margin-bottom: 16px;
        }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.1em; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 4px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; vertical-align: middle; }
        tr:hover { background: #f5f8ff; }
        .price { text-align: right; font-weight: bold; color: #e74c3c; }
        .detail-link { color: #4a90d9; text-decoration: none; }
        .detail-link:hover { text-decoration: underline; }
        .edit-link { color: #e67e22; text-decoration: none; margin-right: 8px; }
        .edit-link:hover { text-decoration: underline; }
        .btn-delete {
            background: none; border: none; color: #e74c3c;
            cursor: pointer; font-size: 0.95em; padding: 0; text-decoration: underline;
        }
        .btn-delete:hover { color: #c0392b; }

        footer { margin-top: 40px; border-top: 1px solid #dee2e6; padding-top: 12px; color: #6c757d; font-size: 0.85em; }
    </style>
</head>
<body>

<h1>상품 목록</h1>

<!-- 검색 폼 -->
<form th:action="@{/products}" method="get" class="search-bar">
    <input type="text" name="keyword"
           th:value="${keyword}"
           placeholder="상품명 검색"/>
    <select name="categoryId">
        <option value="">-- 전체 카테고리 --</option>
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}"
                th:selected="${cat.id == categoryId}">
        </option>
    </select>
    <button type="submit" class="btn-search">검색</button>
    <a href="/products" class="btn-reset">전체보기</a>
</form>

<!-- 성공 메시지 -->
<div class="alert-success" th:if="${successMessage}">
    <span th:text="${successMessage}">성공 메시지</span>
</div>

<!-- 상단 액션 바 -->
<div class="action-bar">
    <span class="result-count" th:text="${'총 ' + products.size() + '개 상품'}"></span>
    <a class="btn" th:href="@{/products/create}">+ 새 상품 등록</a>
</div>

<!-- 결과 없음 -->
<div class="empty-msg" th:if="${#lists.isEmpty(products)}">
    검색 결과가 없습니다.
</div>

<!-- 상품 테이블 -->
<table th:unless="${#lists.isEmpty(products)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>상품명</th>
        <th>카테고리</th>
        <th>가격</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}">1</td>
        <td>
            <a class="detail-link"
               th:href="@{/products/{id}(id=${product.id})}"
               th:text="${product.name}">상품명</a>
        </td>
        <td th:text="${product.category != null ? product.category.name : '-'}">카테고리</td>
        <td class="price"
            th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')} + '원'">
            15,000원
        </td>
        <td>
            <a class="edit-link"
               th:href="@{/products/{id}/edit(id=${product.id})}">수정</a>
            <form th:action="@{/products/{id}/delete(id=${product.id})}"
                  method="post"
                  style="display: inline;"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>

<footer>
    <p th:text="${'실습 수행 일시: ' +
    #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}">
    </p>
    <p>학번: 2291093 | 성명: 이재령</p>
</footer>
</html>
